# Stable project name so container/network names don't change if the release
# directory is renamed on the next upgrade.
name: eh-investigator

services:
  eh-investigator:
    build: .
    image: eh-investigator-agent:local
    # Published only to the host loopback interface, preserving the app's
    # localhost-only security model (it has no built-in authentication).
    ports:
      - "127.0.0.1:3100:3100"
    environment:
      HOST: "0.0.0.0"
      PORT: "3100"
      # Persist non-secret settings (backend, per-backend model prefs, challenger,
      # evidence view, memory, ExtraHop host/family/TLS) in a mounted volume so
      # choices survive restarts/recreates.
      EH_CONFIG_PATH: "/app/data/config.json"
      # Persist secrets (Anthropic key, ExtraHop creds) to a 0600 file in the
      # same volume — the container has no OS keyring, so without this they'd
      # reset on restart. Plaintext at rest, same posture as .env.
      EH_SECRETS_PATH: "/app/data/secrets.json"
      # Persisted eval store (reports history, label overrides, built dashboard)
      # in the same config_data volume, so in-app eval runs + the dashboard survive
      # restarts and share one store.
      EH_EVAL_DATA_DIR: "/app/data/eval"
      # Graphiti temporal memory (Phase 1): wire the agent to the MCP sidecar.
      MEMORY_ENABLED: "1"
      MEMORY_MCP_URL: "http://graphiti-mcp:8000/mcp"
      # Shared memory namespace (per monitored environment). The app derives
      # eh<sanitized-host> when unset; set it explicitly to keep the app (Pi
      # extension) and the graphiti sidecar (Claude default) on one graph.
      EH_MEMORY_GROUP_ID: ${EH_MEMORY_GROUP_ID:-}
      # Read-only FalkorDB access for the memory-graph viz (GRAPH.RO_QUERY only).
      # Same store the graphiti sidecar writes; the app reads it directly to render
      # the "What do we know?" panel. Reachable on the compose network.
      FALKORDB_URI: ${FALKORDB_URI:-redis://falkordb:6379}
      FALKORDB_PASSWORD: ${FALKORDB_PASSWORD:-}
      # Claude Code backend auth for a headless container, and the fallback the
      # memory proxy uses if no key is set in Settings. Prefer setting the key
      # in Settings → Memory (stored in the app secret store); this env is just
      # the fallback. If you run an in-container `claude` /login you can drop it.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Shared token the graphiti sidecar uses to authenticate to the app's
      # /memory-llm proxy (must match the sidecar's value).
      EH_DEPLOYMENT_PROFILE: ${EH_DEPLOYMENT_PROFILE:-local}
      EH_MEMORY_PROXY_TOKEN: ${EH_MEMORY_PROXY_TOKEN:-eh-memory-proxy-local}
      EH_MEMORY_PROXY_MAX_BODY_BYTES: ${EH_MEMORY_PROXY_MAX_BODY_BYTES:-4194304}
      EH_MEMORY_PROXY_TIMEOUT_MS: ${EH_MEMORY_PROXY_TIMEOUT_MS:-90000}
      EH_MEMORY_PROXY_MAX_REQUESTS_PER_MINUTE: ${EH_MEMORY_PROXY_MAX_REQUESTS_PER_MINUTE:-120}
      EH_MEMORY_PROXY_MAX_CONCURRENT: ${EH_MEMORY_PROXY_MAX_CONCURRENT:-8}
      # Where the app writes the Graphiti embedder overrides (Settings → Memory →
      # Embedder). Bind-mounted below so the graphiti-mcp service reads the same
      # file via its env_file on restart.
      EH_EMBEDDER_ENV_PATH: /app/graphiti/runtime/embedder.env
      # RevealX Enterprise
      EXTRAHOP_HOST: ${EXTRAHOP_HOST:-}
      EXTRAHOP_API_KEY: ${EXTRAHOP_API_KEY:-}
      EXTRAHOP_INSECURE: ${EXTRAHOP_INSECURE:-false}
      # — or — RevealX 360 (leave the two lines above unset)
      EXTRAHOP_CLIENT_ID: ${EXTRAHOP_CLIENT_ID:-}
      EXTRAHOP_CLIENT_SECRET: ${EXTRAHOP_CLIENT_SECRET:-}
    volumes:
      - workspaces:/app/workspaces
      - pi_home:/root/.pi
      # Persists the Claude Code login (CLAUDE_CONFIG_DIR points here). New
      # volume; created on first up. Log in with:
      #   docker compose run --rm -it eh-investigator claude   (then /login)
      - claude_home:/root/.claude
      # Persisted app settings (config.json). See EH_CONFIG_PATH above.
      - config_data:/app/data
      # App-managed embedder overrides, shared with graphiti-mcp's env_file. A
      # directory bind (not a single file) so a fresh clone with no file yet
      # doesn't get a directory created in its place.
      - ./graphiti/runtime:/app/graphiti/runtime
    restart: unless-stopped

  # --- Graphiti temporal-memory stack (Phase 0 PoC) ---
  # FalkorDB graph store. Not published to the host — reachable only on the
  # compose network. The Browser UI is exposed on loopback for graph inspection.
  falkordb:
    image: falkordb/falkordb:latest@sha256:9042fdc4e53f5390ca5a3993aa71506523970efb40ffb9a98e6a4b1a9a4f8862
    environment:
      FALKORDB_PASSWORD: ${FALKORDB_PASSWORD:-}
      BROWSER: "1"
    ports:
      - "127.0.0.1:3001:3000"   # FalkorDB Browser UI (graph inspection)
    volumes:
      - falkordb_data:/var/lib/falkordb/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # One-shot model fetch. Downloads the nomic-embed-text GGUF into the shared
  # volume on first run, then exits; subsequent `up` calls find the file and
  # skip the download. Keeps the 274 MB weight file out of the repo while still
  # making a fresh clone work with no manual step.
  #
  # Supply-chain pin: fetched by immutable commit revision (not `main`) and
  # verified against the expected sha256 before it is put in place. A hash
  # mismatch fails the container (and thus `up`) rather than serving unexpected
  # weights. To advance: bump MODEL_REVISION, download once, and replace
  # MODEL_SHA256 with the new file's `sha256sum`. The sha256 is the LFS `oid` of
  # the file at that revision and equals 768-dim nomic-embed-text-v1.5 f16.
  embeddings-init:
    image: alpine:3.20
    environment:
      MODEL_REPO: nomic-ai/nomic-embed-text-v1.5-GGUF
      MODEL_FILE: nomic-embed-text-v1.5.f16.gguf
      MODEL_REVISION: 0188c9bf409793f810680a5a431e7b899c46104c
      MODEL_SHA256: f7af6f66802f4df86eda10fe9bbcfc75c39562bed48ef6ace719a251cf1c2fdb
    volumes:
      - embed_models:/models
    command:
      - sh
      - -c
      - |
        set -e
        f="/models/$$MODEL_FILE"
        verify() { echo "$$MODEL_SHA256  $$1" | sha256sum -c - >/dev/null 2>&1; }
        if [ -s "$$f" ] && verify "$$f"; then
          echo "model present and verified, skipping download"; exit 0
        fi
        [ -s "$$f" ] && echo "existing model failed checksum — re-downloading"
        echo "fetching $$MODEL_FILE @ $$MODEL_REVISION (~274 MB)..."
        apk add --no-cache curl
        curl -fsSL -o "$$f.part" \
          "https://huggingface.co/$$MODEL_REPO/resolve/$$MODEL_REVISION/$$MODEL_FILE"
        if ! verify "$$f.part"; then
          echo "CHECKSUM MISMATCH — refusing to install; expected $$MODEL_SHA256"
          echo "got: $$(sha256sum "$$f.part" | cut -d' ' -f1)"
          rm -f "$$f.part"; exit 1
        fi
        mv "$$f.part" "$$f"
        echo "model ready (sha256 verified)"
    restart: "no"

  # Local embeddings (nomic-embed-text v1.5) via llama.cpp's OpenAI-compatible
  # /v1/embeddings endpoint, so embeddings never leave the host. Replaced Ollama
  # (2026-07-20): Ollama's image is 7.03 GB, of which 3.5 GB is CUDA that can
  # never execute here (Docker on macOS has no GPU passthrough) — llama.cpp is
  # 1.17 GB. Verified bit-identical output vs Ollama on the same weights
  # (max elementwise delta 8.8e-08); see docs/DESIGN-graphiti-memory.md.
  #
  # -c/-b/-ub 2048 all match the model's real training context. nomic-bert is
  # trained at 2048 tokens; Ollama ran it at num_ctx 8192 and silently truncated
  # anything longer, so long inputs were being embedded from a fraction of their
  # text. llama.cpp instead rejects oversized input with a clear 500. Practical
  # ceiling is ~6000 chars; the largest real episode observed is ~2465.
  embeddings:
    image: ghcr.io/ggml-org/llama.cpp:server@sha256:e10504c7f5c5bacece7e7e5957760eee53868642d853fe5ecfe8611065929a24
    depends_on:
      embeddings-init:
        condition: service_completed_successfully
    volumes:
      - embed_models:/models:ro
    command:
      - -m
      - /models/nomic-embed-text-v1.5.f16.gguf
      - --embedding
      - --pooling
      - mean
      - -c
      - "2048"
      - -b
      - "2048"
      - -ub
      - "2048"
      - --host
      - 0.0.0.0
      - --port
      - "8080"
    # Not published to the host: llama.cpp's server allows all CORS origins and
    # takes no API key, so it stays on the compose network only.
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Graphiti MCP server (HTTP transport on :8000/mcp/). Anthropic does the
  # entity/edge extraction; our custom config + ExtraHop ontology is mounted in.
  graphiti-mcp:
    # Custom image = upstream standalone + the anthropic package (see graphiti/Dockerfile).
    image: eh-graphiti-mcp:local
    build:
      context: ./graphiti
      dockerfile: Dockerfile
    depends_on:
      falkordb:
        condition: service_healthy
      embeddings:
        condition: service_healthy
    environment:
      CONFIG_PATH: /app/mcp/config/config.yaml
      FALKORDB_URI: redis://falkordb:6379
      FALKORDB_DATABASE: ${FALKORDB_DATABASE:-extrahop}
      FALKORDB_PASSWORD: ${FALKORDB_PASSWORD:-}
      SEMAPHORE_LIMIT: ${SEMAPHORE_LIMIT:-6}
      MODEL_NAME: ${MODEL_NAME:-claude-sonnet-5}
      # Route Anthropic extraction through the app proxy, which injects the
      # UI-managed key. Graphiti authenticates to the proxy with the shared
      # token (not the real key), so the real key lives only in the app.
      # The MCP factory drops the config api_url for the Anthropic client, so
      # redirect via the SDK's own env var (as with OPENAI_BASE_URL for the
      # local embedding server).
      ANTHROPIC_API_URL: "http://eh-investigator:3100/memory-llm"
      ANTHROPIC_BASE_URL: "http://eh-investigator:3100/memory-llm"
      ANTHROPIC_API_KEY: ${EH_MEMORY_PROXY_TOKEN:-eh-memory-proxy-local}
      # Embedder → any OpenAI-compatible endpoint (the local llama.cpp
      # `embeddings` service by default). The tunable bits (EMBEDDER_MODEL /
      # EMBEDDER_DIMENSIONS / OPENAI_API_URL) come from the app-managed env_file
      # below — edit them in Settings → Memory → Embedder, or by hand in
      # graphiti/runtime/embedder.env. When the file (or a var) is absent,
      # config.yaml's ${VAR:default} fallbacks apply. Dimensions must match the
      # model (nomic-embed-text=768, OpenAI text-embedding-3-*=1536); changing it
      # requires re-embedding existing memory.
      #
      # NOTE: graphiti_core's OpenAI embedder truncates to embedding_dim rather
      # than erroring, so a dimensions mismatch degrades retrieval silently
      # instead of failing loudly. Check this value when changing models.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-local}
    # App-managed runtime overrides (embedder + GRAPHITI_GROUP_ID). Written by the
    # app when Settings → Memory changes; picked up on the next start of this
    # service. Optional, so a fresh clone (no file yet) falls back to config.yaml
    # defaults. The memory namespace lives here rather than in `environment:` so
    # the UI owns it and a stack recreate cannot silently switch namespaces —
    # `environment:` would override env_file. Settings → Memory is the authority;
    # EH_MEMORY_GROUP_ID is only the default while that setting is blank. The app
    # resolves the two and writes the winner into this file.
    env_file:
      - path: ./graphiti/runtime/embedder.env
        required: false
    volumes:
      - ./graphiti/config.yaml:/app/mcp/config/config.yaml:ro
    ports:
      - "127.0.0.1:8000:8000"   # MCP HTTP endpoint (loopback only)
    restart: unless-stopped

volumes:
  # All volumes are project-managed: `docker compose up` creates them on first
  # run, and they persist across restarts and upgrades. Nothing external is
  # required, so a fresh clone works with no pre-created volumes.
  #
  # Persisted investigation workspaces (sessions, evidence, reports).
  workspaces:
  # Pi coding-agent backend home (its provider login/config).
  pi_home:
  # Claude Code backend login.
  claude_home:
  # Persisted app settings (config.json).
  config_data:
  # Graphiti memory stack volumes.
  falkordb_data:
  # Local embedding weights (nomic-embed-text GGUF), populated by embeddings-init.
  embed_models:
