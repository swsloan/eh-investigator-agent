name: security-supply-chain

on:
  pull_request: {}
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0

  image-security:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Verify the pinned excli source against committed checksums
        run: bash scripts/verify-vendored-artifacts.sh
      - name: Validate local and hardened Compose profiles
        run: |
          docker compose config --quiet
          npm run compose:hardened -- config --quiet
      - name: Build application image
        run: docker build -t eh-investigator-agent:ci .
      - name: Build Graphiti image
        run: docker build -t eh-graphiti-mcp:ci graphiti
      - name: Scan images and enforce the CRITICAL merge gate
        # Reports fixable HIGH+CRITICAL for every image; fails the build only on
        # CRITICAL in our own application image (see scripts/security-scan.sh and
        # docs/SECURITY-HARDENING.md -> "Vulnerability baseline").
        run: bash scripts/security-scan.sh
      - name: Generate SPDX SBOMs
        run: bash scripts/generate-sbom.sh
      - name: Upload security reports and SBOMs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: phase-2-supply-chain-reports
          path: |
            artifacts/security/*.trivy.json
            artifacts/sbom/*.spdx.json
          if-no-files-found: error
