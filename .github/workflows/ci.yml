# Core CI: runs on every push and PR. Guards the application code (server.js,
# lib/, routes/) that the eval-dashboard workflow does not cover — syntax check
# plus the node --test suite. Keep this green before merging to main.
name: ci
on:
  push:
    branches: ["main"]
  pull_request: {}
  workflow_dispatch: {}
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Syntax check
        run: npm run check
      - name: Unit tests
        run: npm test
